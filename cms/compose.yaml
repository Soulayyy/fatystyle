services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    env_file: .env
    volumes:
      - .:/var/www/html
      - cms-vendor:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: nginx:1.28-alpine
    ports:
      - "8083:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-fatystyle_cms}
      POSTGRES_USER: ${DB_USERNAME:-fatystyle}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fatystyle-local-only}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - cms-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "127.0.0.1:8026:8025"
      - "127.0.0.1:1026:1025"

volumes:
  cms-postgres:
  cms-vendor:
